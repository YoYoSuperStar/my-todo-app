<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f0f5;
      font-family: "Roboto", sans-serif;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 28px;
      color: #5bb8f5;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #999;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: #f4f4f8;
      font-size: 15px;
      color: #333;
      outline: none;
      margin-bottom: 20px;
    }

    input[type="text"]::placeholder { color: #bbb; }

    .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

    .task {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f4f4f8;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-content { flex: 1; }

    .task-title {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }

    .task-due {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    .task.done .task-title {
      text-decoration: line-through;
      color: #bbb;
    }

    .task-actions { display: flex; gap: 8px; align-items: center; }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #ccc;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .btn-icon:hover { color: #999; }

    .add-section { border-top: 1px solid #f0f0f5; padding-top: 20px; }

    .add-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .add-row input { margin-bottom: 0; }

    .add-btn {
      background: #8b7fd4;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #7a6ec3; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>My To Do List</h1>

    <div class="section-label">SEARCH</div>
    <input type="text" id="search" placeholder="Enter your search term..." oninput="render()" />

    <div class="task-list" id="task-list"></div>

    <div class="add-section">
      <div class="section-label">ADD NEW</div>
      <div class="add-row">
        <input type="text" id="new-task" placeholder="Add new todo..." />
        <input type="text" id="new-due" placeholder="When? (optional)" />
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ["#8b7fd4", "#5bb8f5", "#f472a8"];
    const API = "http://localhost:5000";
    let tasks = [];

    async function loadTasks() {
      const res = await fetch(`${API}/tasks`);
      tasks = await res.json();
      render();
    }

    async function addTask() {
      const title = document.getElementById("new-task").value.trim();
      const due = document.getElementById("new-due").value.trim();
      if (!title) return;

      const btn = document.querySelector(".add-btn");
      btn.textContent = "Adding...";
      btn.disabled = true;

      await fetch(`${API}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, due })
      });

      document.getElementById("new-task").value = "";
      document.getElementById("new-due").value = "";
      btn.textContent = "Add";
      btn.disabled = false;
      await loadTasks();
    }

    async function toggleDone(i) {
      await fetch(`${API}/tasks/${i}`, { method: "PATCH" });
      await loadTasks();
    }

    async function deleteTask(i) {
      await fetch(`${API}/tasks/${i}`, { method: "DELETE" });
      await loadTasks();
    }

    function render() {
      const query = document.getElementById("search").value.toLowerCase();
      const list = document.getElementById("task-list");
      const filtered = tasks
        .map((t, i) => ({ ...t, i }))
        .filter(t => t.title.toLowerCase().includes(query));

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet!</div>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task ${t.done ? "done" : ""}">
          <div class="dot" style="background:${COLORS[t.i % COLORS.length]}"></div>
          <div class="task-content">
            <div class="task-title">${t.title}</div>
            ${t.due_formatted ? `<div class="task-due">${t.due_formatted}</div>` : t.due ? `<div class="task-due">${t.due}</div>` : ""}
            ${t.calendar_event_id ? `<div class="task-due">📅 On Google Calendar</div>` : ""}
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="toggleDone(${t.i})" title="Mark done">✓</button>
            <button class="btn-icon" onclick="deleteTask(${t.i})" title="Delete">🗑</button>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("new-task").addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });

    loadTasks();
  </script>
</body>
</html>
